<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00071A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Viro" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/jpeg"                href="/logo.jpg" />
    <link rel="apple-touch-icon"                      href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png" />

    <!-- SEO + OG -->
    <title>Viro — Smart Shopping, Better Living</title>
    <meta name="description" content="Quality products delivered fast in Burewala & across Pakistan." />
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://www.viro.pk/" />
    <meta property="og:title"        content="Viro — Smart Shopping, Better Living" />
    <meta property="og:description"  content="Quality products delivered fast in Burewala & across Pakistan." />
    <meta property="og:image"        content="https://www.viro.pk/icon-512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:image"       content="https://www.viro.pk/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet" />

    <style>
      /* Reset — dark background from frame 0 so no white flash ever */
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html, body { background:#00071A; } body { overflow-x:hidden; }

      /* ═══════════════════════════════════════
         VIRO SPLASH SCREEN
         Full-screen, covers #root until React
         mounts. Fades out smoothly.
      ═══════════════════════════════════════ */
      #viro-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 50% 40%, #0F1A35 0%, #00071A 70%);
        transition: opacity 0.55s ease, transform 0.55s ease;
      }
      #viro-splash.hide {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }

      /* ── Logo ── */
      .s-logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      /* Outer glow ring */
      .s-ring {
        position: absolute;
        border-radius: 50%;
        border: 1.5px solid transparent;
      }
      .s-ring-1 {
        width: 200px; height: 200px;
        border-color: rgba(139,92,246,0.2);
        animation: ringPulse 2.2s ease-in-out infinite;
      }
      .s-ring-2 {
        width: 155px; height: 155px;
        border-color: rgba(0,191,255,0.18);
        animation: ringPulse 2.2s 0.5s ease-in-out infinite;
      }

      /* Logo image — circular, glowing */
      .s-logo {
        width: 120px;
        height: 120px;
        border-radius: 30px;
        object-fit: cover;
        position: relative;
        z-index: 2;
        animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        box-shadow:
          0 0 0 3px rgba(139,92,246,0.3),
          0 0 40px rgba(139,92,246,0.4),
          0 0 80px rgba(0,191,255,0.15);
      }

      /* ── Brand name ── */
      .s-brand {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #00BFFF 0%, #8B5CF6 50%, #F97316 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeUp 0.5s 0.15s ease both;
      }

      .s-tagline {
        margin-top: 6px;
        font-size: 12px;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.8px;
        font-family: system-ui, sans-serif;
        animation: fadeUp 0.5s 0.28s ease both;
      }

      /* ── Loading bar ── */
      .s-bar-wrap {
        margin-top: 48px;
        width: 140px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
        animation: fadeUp 0.4s 0.4s ease both;
      }
      .s-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #00BFFF, #8B5CF6, #F97316);
        animation: loadBar 1.8s ease-in-out infinite;
      }

      /* ── Keyframes ── */
      @keyframes logoPop {
        0%   { opacity:0; transform:scale(0.55) translateY(12px); }
        100% { opacity:1; transform:scale(1)    translateY(0); }
      }
      @keyframes fadeUp {
        0%   { opacity:0; transform:translateY(16px); }
        100% { opacity:1; transform:translateY(0); }
      }
      @keyframes ringPulse {
        0%,100% { transform:scale(1);    opacity:0.8; }
        50%      { transform:scale(1.08); opacity:0.3; }
      }
      @keyframes loadBar {
        0%   { width:0%;   margin-left:0%; }
        50%  { width:70%;  margin-left:15%; }
        100% { width:0%;   margin-left:100%; }
      }
    </style>
  </head>

  <body style="overflow:hidden">
    <!-- ══ Splash — shown before React mounts ══ -->
    <div id="viro-splash" style="overflow:hidden">
      <div class="s-logo-wrap">
        <div class="s-ring s-ring-1"></div>
        <div class="s-ring s-ring-2"></div>
        <img class="s-logo" src="/logo.jpg" alt="Viro" />
      </div>
      <div class="s-brand">viro</div>
      <div class="s-tagline">Smart Shopping, Better Living</div>
      <div class="s-bar-wrap">
        <div class="s-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash when React renders its first child
      const splash = document.getElementById('viro-splash')
      const root   = document.getElementById('root')
      let removed  = false

      function removeSplash() {
        if (removed) return
        removed = true
        splash.classList.add('hide')
        // Restore body scroll immediately
        document.body.style.overflow = ''
        document.documentElement.style.overflow = ''
        setTimeout(() => splash.remove(), 600)
      }

      // Watch for React mount
      new MutationObserver((_, obs) => {
        if (root.childElementCount > 0) {
          setTimeout(removeSplash, 150) // tiny delay so first paint is visible
          obs.disconnect()
        }
      }).observe(root, { childList: true })

      // Hard failsafe: remove after 5s no matter what
      setTimeout(removeSplash, 5000)

      // Also remove immediately when page becomes interactive
      document.addEventListener('DOMContentLoaded', () => {
        // Give React 800ms to mount before force-removing
        setTimeout(removeSplash, 800)
      })
    </script>

  </body>
</html>
